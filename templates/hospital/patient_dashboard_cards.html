<!-- Patient Dashboard Stat Cards - First Row -->
<div class="market-updates">
  
  <!-- Doctor Name Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-1">
      <div class="market-update-left">
        <h3>{{ doctorName }}</h3>
        <h4>Assigned Doctor</h4>
      </div>
      <div class="market-update-right">
        <i class="fas fa-user-md"></i>
      </div>
    </div>
  </div>

  <!-- Symptoms Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-2">
      <div class="market-update-left">
        <h3>{{ symptoms }}</h3>
        <h4>Current Symptoms</h4>
      </div>
      <div class="market-update-right">
        <i class="fas fa-notes-medical"></i>
      </div>
    </div>
  </div>

  <!-- Doctor Mobile Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-3">
      <div class="market-update-left">
        <h3>{{ doctorMobile }}</h3>
        <h4>Doctor's Contact</h4>
      </div>
      <div class="market-update-right">
        <i class="fas fa-phone"></i>
      </div>
    </div>
  </div>

  <div class="clearfix"></div>
</div>

<br><br>

<!-- Patient Dashboard Stat Cards - Second Row -->
<div class="market-updates">
  
  <!-- Doctor Address Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-1">
      <div class="market-update-left">
        <h3>{{ doctorAddress }}</h3>
        <h4>Doctor's Location</h4>
      </div>
      <div class="market-update-right">
        <i class="fas fa-map-marker-alt"></i>
      </div>
    </div>
  </div>

  <!-- Doctor Department Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-2">
      <div class="market-update-left">
        <h3>{{ doctorDepartment }}</h3>
        <h4>Department</h4>
      </div>
      <div class="market-update-right">
        <i class="fas fa-hospital"></i>
      </div>
    </div>
  </div>

  <!-- Admit Date Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-3">
      <div class="market-update-left">
        <h3>{{ admitDate }}</h3>
        <h4>Admission Date</h4>
      </div>
      <div class="market-update-right">
        <i class="fas fa-calendar-alt"></i>
      </div>
    </div>
  </div>

  <div class="clearfix"></div>
</div>
