<!-- Doctor Dashboard Stat Cards -->
<div class="market-updates">

  <!-- Appointments Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-1">
      <div class="market-update-left">
        <h3>{{ appointmentcount }}</h3>
        <h4>Lịch hẹn của tôi</h4>
        <p>Tư vấn sắp tới</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-calendar-check"></i>
      </div>
    </div>
  </div>

  <!-- Patients Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-2">
      <div class="market-update-left">
        <h3>{{ patientcount }}</h3>
        <h4>Bệnh nhân của tôi</h4>
        <p>Đang được chăm sóc</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-users"></i>
      </div>
    </div>
  </div>

  <!-- Discharged Patients Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-3">
      <div class="market-update-left">
        <h3>{{ patientdischarged }}</h3>
        <h4>Bệnh nhân đã xuất viện</h4>
        <p>Hoàn thành điều trị</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-check-circle"></i>
      </div>
    </div>
  </div>

  <div class="clearfix"></div>
</div>
