<!-- Admin Dashboard Stat Cards -->
<div class="market-updates">
  
  <!-- Total Doctors Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-1">
      <div class="market-update-left">
        <h3>{{ doctorcount }}</h3>
        <h4>Total Doctors</h4>
        <p>Pending Approval: {{ pendingdoctorcount }}</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-stethoscope"></i>
      </div>
    </div>
  </div>

  <!-- Total Patients Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-2">
      <div class="market-update-left">
        <h3>{{ patientcount }}</h3>
        <h4>Total Patients</h4>
        <p>Awaiting Admission: {{ pendingpatientcount }}</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-users"></i>
      </div>
    </div>
  </div>

  <!-- Total Appointments Card -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-3">
      <div class="market-update-left">
        <h3>{{ appointmentcount }}</h3>
        <h4>Appointments</h4>
        <p>Approval Needed: {{ pendingappointmentcount }}</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-calendar-check"></i>
      </div>
    </div>
  </div>

  <!-- Additional Stats Card (if needed) -->
  <div class="market-update-gd">
    <div class="market-update-block clr-block-4">
      <div class="market-update-left">
        <h3>Dashboard</h3>
        <h4>System Status</h4>
        <p>All Systems Operational</p>
      </div>
      <div class="market-update-right">
        <i class="fas fa-heartbeat"></i>
      </div>
    </div>
  </div>

  <div class="clearfix"></div>
</div>
